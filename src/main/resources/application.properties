spring.application.name=honeymoney

# Base de datos en memoria
spring.datasource.url=jdbc:h2:mem:honeymoney
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
# El valor por defecto SOLO aplica para desarrollo local. En cualquier entorno real
# (staging/producción) se debe definir la variable de entorno JWT_SECRET con un valor
# propio (ver .env.example). Nunca commitear un secreto real en este archivo.
jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1kby1ub3QtdXNlLWluLXByb2R1Y3Rpb24tSG9uZXlNb25leS0yMDI2}
jwt.expiration=${JWT_EXPIRATION:3600000}

# SpringDoc
springdoc.writer-with-default-pretty-printer=true